<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta -->
  <meta name="description" content="Digital storytelling at the intersection of culture and technology — portfolio of projects, writing, and experience." />

  <!-- Open Graph (Facebook, LinkedIn, iMessage) -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://portfolio.liubuntu.tech/" />
  <meta property="og:title" content="Liuba Kuibida — Digital Creative" />
  <meta property="og:description" content="Digital storytelling at the intersection of culture and technology." />
  <meta property="og:image" content="https://portfolio.liubuntu.tech/og-image.png" />
  <title>Liuba Kuibida — Digital Creative</title>
  <link rel="icon" href="favicon.svg" />
  <link rel="stylesheet" href="css/styles.css" />

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>

  <div id="app">
    <header class="site-header">
      <h1 class="name">Liuba Kuibida</h1>
      <p class="role">DIGITAL STORYTELLING AT THE INTERSECTION OF <span class="accent">CULTURE AND TECHNOLOGY</span></p>
    </header>
    <div class="container">
      <section class="filters">
        <button
          @click="activeType = 'all'"
          :class="{ active: activeType === 'all' }"
        >
          all
        </button>
        <button 
          v-for="type in entryTypes" 
          :key="type"
          @click="activeType = type"
          :class="{ active: activeType === type }"
        >
          {{ type }}
        </button>
      </section>

      <section class="grid">
        <article 
          v-for="entry in filteredEntries" 
          :key="entry.id"
          class="card"
          :class="{ featured: entry.featured, ongoing: entry.is_ongoing }"
        >
          <div 
            class="meta"
          >
            {{ formatDateRange(entry) }}
          </div>

          <h2 class="title">{{ entry.title }}</h2>
          <p class="org">{{ entry.organization }}</p>
          
          <details class="summary-toggle" :open="entry.featured">
            <summary>Details</summary>
            <p class="summary">{{ entry.summary }}</p>
          </details>

          <a 
            v-if="entry.link" 
            :href="entry.link" 
            target="_blank" 
            rel="noopener noreferrer"
            class="link"
          >
            LINK
          </a>

          <ul v-if="entry.fields?.length" class="tags">
            <li v-for="tag in entry.fields" :key="tag">
              {{ tag }}
            </li>
          </ul>
        </article>

    </section>
    </div>
  </div>
  <footer class="site-footer minimal">
      <a href="mailto:liubuntu@proton.me" target="_blank" class="link">Email</a>
      <a href="https://liubuntu.tech/" target="_blank" class="link">Website</a>
      <a href="https://blog.liubuntu.tech/" target="_blank" class="link">Blog</a>
      <a href="https://www.linkedin.com/in/liuba-kuibida/" target="_blank" class="link">LinkedIn</a>
    </footer>

  <script src="js/app.js"></script>
</body>
</html>
